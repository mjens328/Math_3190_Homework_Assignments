project:
  type: website
  output-dir: docs

website:
  title: "Math 3190 Homework"
  description: "Homework assignments for Math 3190: Fundamentals of Data Science at Southern Utah University."

  navbar:
    background: primary
    search: true
    left:
      - href: index.qmd
        text: Home
      - href: about.qmd
        text: About
      - href: Homework/index.qmd
        text: Homework
    right:
      - icon: github
        href: https://github.com/mjens328/Math_3190_Homework_Assignments
        aria-label: GitHub
      - icon: envelope
        href: "mailto:meljensen328@gmail.com"
        aria-label: Email

  sidebar:
    - id: homework
      title: "Assignments"
      style: "docked"
      collapse-level: 2
      contents:
        - Homework/index.qmd
        - section: "Assignments"
          contents:
            - Homework/Homework_1.qmd
            - Homework/Homework_2.qmd
            - Homework/Homework_3.qmd
            - Homework/Homework_4.qmd
            - Homework/Homework_5.qmd
            - Homework/Homework_6.qmd
            - Homework/Homework_7.qmd
            - Homework/Homework_8.qmd
            - Homework/Homework_9.qmd
