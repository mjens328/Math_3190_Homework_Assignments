  page-footer:
    background: light
    left: |
      &copy; 2026 Melanie Jensen &middot; Math 3190 at Southern Utah University
    center: |
      Built with [Quarto](https://quarto.org/)
    right: |
      More at [GitHub](https://github.com/mjens328/Math_3190_Homework_Assignments)

format:
  html:
    theme: flatly
    css: styles.css
    toc: true
